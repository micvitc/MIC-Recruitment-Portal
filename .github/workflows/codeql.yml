# .github/workflows/codeql.yml
#
# GitHub CodeQL — Static Application Security Testing (SAST)
# Automatically scans your TypeScript/JavaScript code for vulnerabilities
# on every push and pull request. Completely free for all GitHub repos.
#
# What it catches:
#   • Injection flaws (SQL, command, path traversal)
#   • XSS vulnerabilities
#   • Insecure use of crypto
#   • Prototype pollution
#   • Hardcoded secrets (via secret scanning integration)
#
# Results appear in: GitHub → Security → Code scanning alerts

name: "CodeQL Security Scan"

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    # Full weekly scan every Sunday at 2am UTC (7:30am IST)
    - cron: "0 2 * * 0"

jobs:
  analyze:
    name: Analyze TypeScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write  # Required to upload CodeQL results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use the security-extended query suite for broader coverage
          # (includes OWASP Top 10, CWE Top 25)
          queries: security-extended

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
